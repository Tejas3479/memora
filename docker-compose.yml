version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: memora-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: memora
      POSTGRES_PASSWORD: memora_dev
      POSTGRES_DB: memora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memora -d memora"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - memora-network

  redis:
    image: redis:7-alpine
    container_name: memora-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - memora-network

  qdrant:
    image: qdrant/qdrant:v1.14.0
    container_name: memora-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - memora-network

  # -----------------------------------------------------------------------
  # Zep – long-term memory service (optional, uncomment to enable)
  # -----------------------------------------------------------------------
  # zep:
  #   image: zepai/zep:latest
  #   container_name: memora-zep
  #   restart: unless-stopped
  #   ports:
  #     - "8000:8000"
  #   environment:
  #     ZEP_STORE_TYPE: postgres
  #     ZEP_STORE_POSTGRES_DSN: postgres://memora:memora_dev@postgres:5432/memora?sslmode=disable
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   networks:
  #     - memora-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  memora-network:
    driver: bridge
