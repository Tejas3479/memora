<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 320px;
        background-color: #0f0f14;
        color: #e4e4ed;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #2a2a3a;
        padding-bottom: 12px;
        margin-bottom: 16px;
      }
      .logo {
        font-weight: 700;
        color: #7c3aed;
        font-size: 18px;
      }
      .badge {
        font-size: 11px;
        background-color: #2a2a3a;
        padding: 2px 8px;
        border-radius: 12px;
      }
      .btn {
        background-color: #7c3aed;
        color: white;
        border: none;
        padding: 10px;
        width: 100%;
        border-radius: 6px;
        font-weight: 600;
        cursor: pointer;
        margin-bottom: 12px;
      }
      .btn:hover {
        background-color: #6d28d9;
      }
      .btn-secondary {
        background-color: #2a2a3a;
        color: #e4e4ed;
      }
      .btn-secondary:hover {
        background-color: #3b3b4f;
      }
      .settings-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 16px;
        font-size: 14px;
      }
      .footer {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
      }
      .footer a {
        color: #7c3aed;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">Memora</div>
      <div class="badge" id="status-badge">Checking...</div>
    </div>
    
    <button class="btn" id="capture-btn">Capture Page</button>
    <button class="btn btn-secondary" id="sync-btn">Sync Offline Queue (0)</button>

    <div class="settings-row">
      <span>Auto-Capture</span>
      <input type="checkbox" id="auto-capture-check" checked />
    </div>

    <div class="footer">
      <a href="http://localhost:3000/dashboard" target="_blank">Open Dashboard</a>
    </div>

    <script type="module" src="dist/popup.js"></script>
  </body>
</html>
