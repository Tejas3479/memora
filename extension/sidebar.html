<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #050508;
        color: #e4e4ed;
        font-family: 'Inter', system-ui, sans-serif;
        margin: 0;
        padding: 20px;
        box-sizing: border-box;
      }
      .title {
        font-family: 'Outfit', sans-serif;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 20px;
        color: #7c3aed;
        letter-spacing: -0.02em;
      }
      .section-title {
        font-size: 10px;
        font-weight: 600;
        color: #8e8ea8;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 24px;
        margin-bottom: 10px;
      }
      .card {
        background-color: rgba(15, 15, 22, 0.75);
        border: 1px solid rgba(44, 44, 61, 0.5);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding: 14px;
        border-radius: 12px;
        margin-bottom: 12px;
        font-size: 13px;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .card:hover {
        background-color: rgba(24, 24, 36, 0.85);
        border-color: rgba(124, 58, 237, 0.3);
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
      }
      .card-title {
        font-weight: 600;
        color: white;
        margin-bottom: 6px;
        line-height: 1.4;
      }
      .card-meta {
        font-size: 11px;
        color: #8e8ea8;
        font-weight: 500;
      }
      .input-text {
        width: 100%;
        background-color: rgba(15, 15, 22, 0.85);
        border: 1px solid rgba(44, 44, 61, 0.5);
        color: white;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 12px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 13px;
        transition: border-color 0.2s;
      }
      .input-text:focus {
        outline: none;
        border-color: #7c3aed;
      }
      .btn {
        background-color: #7c3aed;
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 10px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 12px rgba(124, 58, 237, 0.15);
      }
      .btn:hover {
        background-color: #6d28d9;
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(124, 58, 237, 0.25);
      }
      .btn:active {
        transform: scale(0.98);
      }
    </style>
  </head>
  <body>
    <div class="title">Memora Context</div>

    <div class="section-title">Related Memories</div>
    <div id="memories-list">
      <div class="card">
        <div class="card-title">Scaling Qdrant configurations</div>
        <div class="card-meta">web • 3 days ago</div>
      </div>
    </div>

    <div class="section-title">Quick Capture</div>
    <textarea class="input-text" id="quick-note" placeholder="Write a note..." rows="4"></textarea>
    <button class="btn" id="save-note-btn">Save Note</button>

    <script type="module" src="dist/sidebar.js"></script>
  </body>
</html>
