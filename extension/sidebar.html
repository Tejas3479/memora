<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        background-color: #0f0f14;
        color: #e4e4ed;
        font-family: system-ui, sans-serif;
        margin: 0;
        padding: 16px;
      }
      .title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 16px;
        color: #7c3aed;
      }
      .section-title {
        font-size: 12px;
        color: #8888a0;
        text-transform: uppercase;
        margin-top: 20px;
        margin-bottom: 8px;
      }
      .card {
        background-color: #1a1a25;
        border: 1px solid #2a2a3a;
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 12px;
        font-size: 13px;
      }
      .card-title {
        font-weight: 600;
        color: white;
        margin-bottom: 4px;
      }
      .card-meta {
        font-size: 11px;
        color: #8888a0;
      }
      .input-text {
        width: 100%;
        background-color: #1a1a25;
        border: 1px solid #2a2a3a;
        color: white;
        padding: 8px;
        border-radius: 4px;
        margin-bottom: 8px;
        box-sizing: border-box;
      }
      .btn {
        background-color: #7c3aed;
        color: white;
        border: none;
        padding: 8px;
        border-radius: 4px;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="title">Memora Context</div>

    <div class="section-title">Related Memories</div>
    <div id="memories-list">
      <div class="card">
        <div class="card-title">Scaling Qdrant configurations</div>
        <div class="card-meta">web • 3 days ago</div>
      </div>
    </div>

    <div class="section-title">Quick Capture</div>
    <textarea class="input-text" id="quick-note" placeholder="Write a note..." rows="4"></textarea>
    <button class="btn" id="save-note-btn">Save Note</button>

    <script type="module" src="dist/sidebar.js"></script>
  </body>
</html>
