<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg-main: #06060c;
        --bg-surface: rgba(18, 18, 30, 0.7);
        --border-color: rgba(44, 44, 68, 0.4);
        --accent-purple: #8b5cf6;
        --accent-glow: rgba(139, 92, 246, 0.15);
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
        --success: #10b981;
      }
      
      body {
        background-color: var(--bg-main);
        background-image: radial-gradient(circle at top right, rgba(139, 92, 246, 0.08), transparent 70%);
        color: var(--text-primary);
        font-family: 'Inter', system-ui, sans-serif;
        margin: 0;
        padding: 16px;
        box-sizing: border-box;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Header */
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 14px;
        flex-shrink: 0;
      }
      .logo {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        color: var(--accent-purple);
        font-size: 18px;
        letter-spacing: -0.02em;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .logo::before {
        content: '';
        width: 8px;
        height: 8px;
        background-color: var(--accent-purple);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--accent-purple);
      }

      /* Navigation Tabs */
      .tabs {
        display: flex;
        background-color: rgba(15, 15, 27, 0.8);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 3px;
        margin-bottom: 16px;
        flex-shrink: 0;
      }
      .tab-btn {
        flex: 1;
        background: none;
        border: none;
        color: var(--text-secondary);
        font-family: inherit;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        padding: 6px 4px;
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .tab-btn.active {
        background-color: var(--accent-purple);
        color: white;
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
      }

      /* Content Area */
      .tab-content-container {
        flex: 1;
        overflow-y: auto;
        padding-right: 4px;
      }
      /* Custom Scrollbar */
      .tab-content-container::-webkit-scrollbar {
        width: 4px;
      }
      .tab-content-container::-webkit-scrollbar-track {
        background: transparent;
      }
      .tab-content-container::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
      }

      .tab-pane {
        display: none;
        animation: fadeIn 0.3s ease-out;
      }
      .tab-pane.active {
        display: block;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Section Labels */
      .section-title {
        font-size: 10px;
        font-weight: 600;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-top: 14px;
        margin-bottom: 8px;
      }

      /* Glassmorphic Card */
      .card {
        background: var(--bg-surface);
        backdrop-filter: blur(10px);
        border: 1px solid var(--border-color);
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 10px;
        font-size: 12px;
        transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        position: relative;
      }
      .card:hover {
        background: rgba(26, 26, 42, 0.85);
        border-color: rgba(139, 92, 246, 0.3);
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
      }
      .card-title {
        font-weight: 600;
        color: white;
        margin-bottom: 4px;
        line-height: 1.4;
      }
      .card-meta {
        font-size: 10px;
        color: var(--text-secondary);
      }

      /* Bullet Summary / highlights logs styles */
      .summary-tldr {
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 12px;
        color: var(--text-primary);
        font-weight: 500;
        border-left: 2px solid var(--accent-purple);
        padding-left: 8px;
      }
      .summary-bullets {
        margin: 0;
        padding-left: 18px;
      }
      .summary-bullets li {
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--text-secondary);
        line-height: 1.4;
      }
      .summary-tag-container {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 12px;
      }
      .summary-tag {
        font-size: 10px;
        background: rgba(139, 92, 246, 0.12);
        color: #a78bfa;
        padding: 2px 8px;
        border-radius: 10px;
        border: 1px solid rgba(139, 92, 246, 0.2);
        font-weight: 500;
      }

      /* Highlight styling */
      .highlight-card {
        border-left: 3px solid #fbbf24;
      }
      .highlight-card.pink { border-left-color: #ec4899; }
      .highlight-card.blue { border-left-color: #3b82f6; }
      .highlight-card.green { border-left-color: #10b981; }
      
      .highlight-text {
        font-style: italic;
        color: var(--text-primary);
        line-height: 1.4;
        margin-bottom: 6px;
      }
      .highlight-note {
        font-size: 11px;
        color: #d1d5db;
        background: rgba(255, 255, 255, 0.04);
        padding: 4px 6px;
        border-radius: 4px;
        margin-bottom: 4px;
      }
      .delete-btn {
        position: absolute;
        top: 8px;
        right: 8px;
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        padding: 2px;
        border-radius: 4px;
        transition: color 0.2s, background-color 0.2s;
      }
      .delete-btn:hover {
        color: #ef4444;
        background-color: rgba(239, 68, 68, 0.1);
      }

      /* Form inputs */
      .input-text {
        width: 100%;
        background-color: rgba(10, 10, 18, 0.85);
        border: 1px solid var(--border-color);
        color: white;
        padding: 8px 10px;
        border-radius: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
        font-family: inherit;
        font-size: 12px;
        transition: border-color 0.2s;
      }
      .input-text:focus {
        outline: none;
        border-color: var(--accent-purple);
      }
      
      .btn {
        background-color: var(--accent-purple);
        color: white;
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 8px 12px;
        border-radius: 8px;
        font-weight: 600;
        font-size: 12px;
        cursor: pointer;
        width: 100%;
        transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 6px;
      }
      .btn:hover {
        background-color: #7c3aed;
        transform: translateY(-0.5px);
        box-shadow: 0 6px 16px rgba(139, 92, 246, 0.25);
      }
      .btn:active {
        transform: scale(0.99);
      }
      .btn-secondary {
        background-color: rgba(15, 15, 22, 0.8);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        box-shadow: none;
      }
      .btn-secondary:hover {
        background-color: rgba(22, 22, 35, 0.9);
        border-color: rgba(255, 255, 255, 0.1);
      }

      /* Loader */
      .loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 24px 0;
        color: var(--text-secondary);
        font-size: 11px;
      }
      .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid var(--border-color);
        border-top-color: var(--accent-purple);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">Memora</div>
    </div>

    <!-- Navigation Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="tab-related">Related</button>
      <button class="tab-btn" data-tab="tab-summary">Summary</button>
      <button class="tab-btn" data-tab="tab-highlights">Highlights</button>
    </div>

    <!-- Tab Contents Container -->
    <div class="tab-content-container">
      
      <!-- RELATED TAB -->
      <div class="tab-pane active" id="tab-related">
        <div class="section-title">Contextual Memories</div>
        <div id="memories-list">
          <div class="loader">
            <div class="spinner"></div>
            <span>Finding context...</span>
          </div>
        </div>

        <div class="section-title" style="margin-top: 20px;">Quick Capture</div>
        <textarea class="input-text" id="quick-note" placeholder="Write a note..." rows="4"></textarea>
        <button class="btn" id="save-note-btn">Save Note</button>
      </div>

      <!-- SUMMARY TAB -->
      <div class="tab-pane" id="tab-summary">
        <div id="summary-section">
          <div style="text-align: center; padding: 24px 0;">
            <p style="font-size: 12px; color: var(--text-secondary); margin-bottom: 14px; line-height: 1.4;">
              Generate an AI-powered summary of the current page including key takeaways and auto-generated tags.
            </p>
            <button class="btn" id="summarize-btn">
              <span>Generate Summary</span>
            </button>
          </div>
        </div>
      </div>

      <!-- HIGHLIGHTS TAB -->
      <div class="tab-pane" id="tab-highlights">
        <div class="section-title">Page Highlights</div>
        <div id="highlights-list">
          <div style="font-size: 11px; color: var(--text-muted); text-align: center; padding: 16px 0;">
            No highlights saved for this page.<br>
            Highlight text on the page & right click to save.
          </div>
        </div>
      </div>

    </div>

    <script type="module" src="dist/sidebar.js"></script>
  </body>
</html>
